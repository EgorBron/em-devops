services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_PORT}
    networks:
      - backend
  nginx:
    image: nginx:1.30.1-alpine3.23
    ports:
      - "${PROXY_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:

