services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
    networks:
      - backend
  nginx:
    image: nginx:1.30.1-alpine3.23
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:
